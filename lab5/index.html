<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Lab 5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">
    <div class="card">

        <div class="image-side">
            <img src="anime.png" alt="Anime girl">
        </div>

        <div class="content-side">
            <h1>Робота із вводом користувача у JavaScript</h1>

            <label for="userName">Введіть своє ім’я:</label>

            <input 
                type="text" 
                id="userName" 
                placeholder="Ваше ім’я"
            >

            <div class="buttons">
                <button id="showBtn">
                    Показати привітання
                </button>

                <button id="clearBtn">
                    Очистити
                </button>
            </div>

            <div id="result">
                Тут з’явиться результат
            </div>

        </div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
